<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Rydes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <canvas id="stars"></canvas>

    <div class="hero">

        <div class="glow-orb glow-orb--1"></div>
        <div class="glow-orb glow-orb--2"></div>

        <header class="hero__header">
            <span class="logo-mark">🦄</span>
            <span class="logo-text">Wild Rydes</span>
        </header>

        <main class="hero__card">
            <div class="unicorn-emoji" aria-hidden="true">🦄</div>
            <h1 class="hero__title">Ride the<br><em>Extraordinary</em></h1>
            <p class="hero__subtitle">
                Unicorn rides, on demand. Wherever you are.<br>No saddle required.
            </p>
            <div class="hero__actions">
                <a href="register.html" class="btn btn--primary">Get Started</a>
                <a href="signin.html" class="btn btn--ghost">Sign In</a>
            </div>
        </main>

        <footer class="hero__footer">
            Powered by serverless magic &amp; real unicorns
        </footer>

    </div>

    <script>
        // Starfield canvas
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initStars() {
            stars = Array.from({ length: 160 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.4 + 0.2,
                alpha: Math.random(),
                speed: Math.random() * 0.004 + 0.001
            }));
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.alpha += s.speed;
                if (s.alpha > 1 || s.alpha < 0) s.speed *= -1;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 180, 255, ${s.alpha})`;
                ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }

        resize();
        initStars();
        drawStars();
        window.addEventListener('resize', () => { resize(); initStars(); });
    </script>

</body>
</html>
